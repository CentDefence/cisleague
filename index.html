<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>League Site</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: #11182a;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #ff2a2a;
}

nav a {
    margin: 0 15px;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

nav a:hover {
    color: #2a6bff;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
    background: linear-gradient(135deg, #0b0f1a, #11182a);
}

.hero h1 {
    font-size: 48px;
    margin-bottom: 10px;
}

.hero p {
    color: #aaa;
}

.hero button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: #ff2a2a;
    color: white;
    font-size: 16px;
    cursor: pointer;
    border-radius: 8px;
}

/* CARDS */
.section {
    padding: 50px 40px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #11182a;
    padding: 20px;
    border-radius: 12px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card h3 {
    margin-bottom: 10px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #11182a;
    margin-top: 40px;
    color: #777;
}
</style>
</head>

<body>

<header>
    <div class="logo">CIS LEAGUE</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Teams</a>
        <a href="#">Matches</a>
        <a href="#">Table</a>
    </nav>
</header>

<section class="hero">
    <h1>Welcome to CIS League</h1>
    <p>Best football league experience</p>
    <button>Get Started</button>
</section>

<section class="section">
    <h2>Leagues</h2>
    <div class="cards">
        <div class="card">
            <h3>Premier Division</h3>
            <p>Main league with top teams</p>
        </div>
        <div class="card">
            <h3>Second Division</h3>
            <p>Upcoming talents</p>
        </div>
        <div class="card">
            <h3>Cup</h3>
            <p>Knockout tournament</p>
        </div>
    </div>
</section>

<footer>
    © 2026 CIS League
</footer>

</body>
</html>
