<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIA League</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0b0b14;
    color: white;
    overflow-x: hidden;
}

/* BACKGROUND DETAIL */
body::before {
    content: "";
    position: fixed;
    width: 150%;
    height: 150%;
    background:
        radial-gradient(circle at 20% 30%, rgba(120,0,255,0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,0,80,0.15), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(0,100,255,0.15), transparent 40%);
    filter: blur(120px);
    z-index: -1;
}

/* HEADER */
header {
    display: flex;
    justify-content: center;
    padding: 15px 30px;
    background: rgba(15,15,25,0.7);
    backdrop-filter: blur(10px);
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px 30px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeSlide 1s forwards 0.3s;
}

.hero h1 {
    font-size: 50px;
    background: linear-gradient(90deg,#8a2eff,#ff2a6d,#2a7bff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
}

.hero p {
    color: #aaa;
    margin-bottom: 25px;
}

/* JOIN BUTTON */
.join-btn {
    margin-top: 20px;
    padding: 14px 50px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg,#7289da,#5865f2);
    color: white;
    cursor: pointer;
    font-size: 16px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(88,101,242,0.5);
}

.join-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(88,101,242,0.8);
}

/* TAGS BELOW JOIN */
.tags-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.tag {
    padding: 12px 20px;
    font-size: 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.3s;
}

.tag:hover {
    transform: scale(1.05);
    border-color: #ff2a6d;
}

/* INFO TEXT */
.info {
    text-align: center;
    max-width: 700px;
    margin: 30px auto;
    color: #bbb;
    line-height: 1.6;
}

.date {
    margin-top: 10px;
    font-size: 17px;
    color: white;
}

/* MAP */
#map {
    width: 100%;
    height: 250px;
    border-radius: 15px;
    margin-top: 30px;
}

/* ANIMATION */
@keyframes fadeSlide {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="hero">
    <h1>CIA LEAGUE</h1>
    <p>Join the new era</p>
    <button class="join-btn" onclick="join()">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" alt="Discord" width="20" height="20">
        Join Now!
    </button>

    <div class="tags-container">
        <div class="tag">👑 Owner: Polcovodec</div>
        <div class="tag">📖 President: Sqvnix</div>
        <div class="tag">👤 Members: 57</div>
    </div>
</div>

<div class="info">
    This will be the best league where the strongest player in the CIS will be determined.<br>
    Sqvnix and Polcovodec are bringing back the legend — CIA.
    <div class="date">14.01.26</div>
</div>

<div id="map"></div>

<script>
function join() {
    window.open("https://discord.gg/WXKUCSwv","_blank");
}

// Google Maps init
function initMap() {
    const map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 50.4501, lng: 30.5234 },
        zoom: 4,
        styles: [
            { "featureType": "all","elementType": "all","stylers":[{"saturation":60},{"lightness":0}] }
        ]
    });
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>

</body>
</html>
